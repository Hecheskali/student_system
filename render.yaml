services:
  - type: web
    name: student-system-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /health/ready
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.12
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: student-system-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_PREVIOUS_SECRET_KEYS
        sync: false
      - key: ENABLE_DOCS
        value: "false"
      - key: ENABLE_HSTS
        value: "true"
      - key: ENABLE_HTTPS_REDIRECT
        value: "false"
      - key: OBSERVABILITY_ENABLED
        value: "true"
      - key: METRICS_ENABLED
        value: "true"
      - key: TRUSTED_HOSTS
        value: localhost,127.0.0.1,*.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        value: System Administrator
  - type: cron
    name: student-system-maintenance
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install .
    schedule: "0 3 * * *"
    startCommand: python -m app.jobs.maintenance
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.12
      - key: APP_ENV
        value: production
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: student-system-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: AUDIT_RETENTION_DAYS
        value: "365"
      - key: SESSION_RETENTION_DAYS
        value: "30"
      - key: SECURITY_TOKEN_RETENTION_DAYS
        value: "14"
  - type: worker
    name: student-system-outbox-worker
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install .
    startCommand: python -m app.jobs.outbox_worker
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.12
      - key: APP_ENV
        value: production
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: student-system-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: EMAIL_PROVIDER
        value: log
      - key: EMAIL_FROM_ADDRESS
        value: noreply@student-system.local
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMS_PROVIDER
        value: log
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: OUTBOX_BATCH_SIZE
        value: "25"
      - key: WORKER_POLL_INTERVAL_SECONDS
        value: "10"
      - key: REDIS_URL
        sync: false

databases:
  - name: student-system-db
    plan: basic-256mb
